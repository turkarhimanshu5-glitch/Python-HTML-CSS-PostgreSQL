name: CI/CD Pipeline

on:
  push:
    branches:
      - main


jobs:

  build-and-deploy:

    runs-on: ubuntu-latest


    steps:


    # Checkout Source Code
    - name: Checkout Code
      uses: actions/checkout@v4



    # Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'



    # Install Dependencies
    - name: Install Dependencies
      run: |
        pip install -r backend/requirements.txt



    # Run Unit Tests
    - name: Run Tests
      run: |
        pytest backend/ || true



    # Docker Login
    - name: Docker Login
      uses: docker/login-action@v3

      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}




    # Build Docker Image
    - name: Build Docker Image
      run: |

        docker build \
        -t ${{ secrets.DOCKER_IMAGE }} \
        ./backend




    # Push Docker Image
    - name: Push Docker Image
      run: |

        docker push ${{ secrets.DOCKER_IMAGE }}






    # Deploy Application to Azure Server
    - name: Deploy to Azure Server

      uses: appleboy/ssh-action@v1


      with:

        host: ${{ secrets.SERVER_HOST }}

        username: ${{ secrets.SERVER_USER }}

        key: ${{ secrets.SERVER_SSH_KEY }}


        script: |

          cd /opt/app


          git pull origin main


          docker-compose pull


          docker-compose down


          docker-compose up -d


          docker ps






    # Application Health Check
    - name: Health Check

      uses: appleboy/ssh-action@v1


      with:

        host: ${{ secrets.SERVER_HOST }}

        username: ${{ secrets.SERVER_USER }}

        key: ${{ secrets.SERVER_SSH_KEY }}


        script: |

          curl http://localhost:5000 || exit 1






    # Rollback If Deployment Failed
    - name: Rollback Deployment

      if: failure()


      uses: appleboy/ssh-action@v1


      with:


        host: ${{ secrets.SERVER_HOST }}


        username: ${{ secrets.SERVER_USER }}


        key: ${{ secrets.SERVER_SSH_KEY }}



        script: |

          cd /opt/app


          docker-compose down


          git checkout main


          docker-compose up -d
