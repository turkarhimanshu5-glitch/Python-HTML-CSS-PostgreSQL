<!DOCTYPE html>
<html>
<head>

<title>Python Flask Project</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    margin-top:50px;
}

h1{
    color:blue;
}

button{

    padding:10px 20px;
    font-size:16px;
    cursor:pointer;

}

#result{

    margin-top:20px;
    font-size:20px;

}

</style>

</head>


<body>


<h1>Python Flask Backend API</h1>


<button onclick="checkAPI()">
    Check Backend
</button>


<div id="result"></div>



<script>


function checkAPI(){


fetch("http://40.81.236.145:5000/api")


.then(response => response.json())


.then(data => {


document.getElementById("result").innerHTML =

"Message : " + data.message;


})


.catch(error=>{


document.getElementById("result").innerHTML =

"Backend connection failed";


});


}


</script>



</body>

</html>
